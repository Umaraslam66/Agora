name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -e ".[dev]"

      - name: ruff (advisory)
        run: ruff check .
        continue-on-error: true

      - name: mask-lint
        run: python -m grounding.masking.mask_lint

      - name: pytest
        run: pytest -v
